<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ダッシュボード — AOリサーチ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;500;600;700;800&family=Noto+Serif+JP:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared/tokens.css">
<style>
  .dash-grid {
    display: grid; grid-template-columns: 2fr 1fr; gap: var(--gap-lg);
    margin-top: var(--gap-lg);
  }
  @media (max-width: 900px) { .dash-grid { grid-template-columns: 1fr; } }
  .stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .stat {
    background: #fff; padding: 20px 22px; border: 1px solid var(--border);
    border-radius: var(--radius-lg); transition: box-shadow .2s;
  }
  .stat:hover { box-shadow: var(--shadow-sm); }
  .stat-num {
    font-family: var(--font-num); font-size: 2rem; font-weight: 800;
    color: var(--brand-blue);
  }
  .stat-label { font-size: .78rem; color: var(--muted); margin-top: 2px; }
  .quick {
    margin-top: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px;
  }
  .quick a {
    display: flex; align-items: center; gap: 10px;
    padding: 15px 16px; background: #fff;
    border: 1.5px solid var(--border); border-radius: var(--radius-lg);
    color: var(--brand-navy); font-weight: 600; font-size: .9rem;
    transition: all .18s;
  }
  .quick a:hover {
    border-color: var(--brand-blue); text-decoration: none;
    box-shadow: var(--shadow-sm); transform: translateY(-1px);
    color: var(--brand-blue);
  }
  .recent-item {
    padding: 12px 14px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .recent-item:last-child { border-bottom: 0; }
  .recent-title { font-weight: 600; color: var(--ink); }
  .recent-sub { font-size: .78rem; color: var(--muted); }
  .status-tag {
    font-size: .72rem; padding: 2px 8px; border-radius: 10px; font-weight: 600;
  }
  .status-tag.done { background: var(--green-soft); color: var(--green); }
  .status-tag.running { background: var(--yellow-soft); color: var(--yellow); }
  .status-tag.error { background: var(--red-soft); color: var(--red); }
  .status-tag.pending { background: #f0f0f0; color: var(--muted); }
</style>
</head>
<body>
<header class="app-header" id="app-header"></header>

<div id="email-banner" style="display:none;background:#fffbeb;border-bottom:1px solid #fcd34d;padding:10px 24px;font-size:.88rem;color:#92400e;display:flex;align-items:center;gap:10px">
  <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
  <span>登録メールを送信しました。メール内のリンクをクリックしてメールアドレスを確認してください。</span>
  <button onclick="document.getElementById('email-banner').style.display='none'" style="margin-left:auto;background:none;border:none;cursor:pointer;color:#92400e;font-size:1rem;line-height:1">✕</button>
</div>

<main class="app-shell">
  <h1 style="margin:0 0 8px;color:var(--brand-navy)">ダッシュボード</h1>
  <p class="muted" id="welcome">読み込み中…</p>

  <div class="stat-row">
    <div class="stat"><div class="stat-num" id="stat-used">—</div><div class="stat-label">今期の利用数</div></div>
    <div class="stat"><div class="stat-num" id="stat-quota">—</div><div class="stat-label">プラン上限</div></div>
    <div class="stat"><div class="stat-num" id="stat-remaining">—</div><div class="stat-label">残り回数</div></div>
  </div>

  <div class="quick" id="quick-links">
    <a href="/app/research">+ 新しい調査を始める</a>
    <a href="/app/search">条件検索</a>
    <a href="/app/compare">比較表</a>
    <a href="/app/saved"><svg aria-hidden="true" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/></svg> 保存一覧</a>
  </div>

  <div class="dash-grid">
    <div class="card">
      <h2 class="card-title">最近の調査</h2>
      <div id="recent-list">読み込み中…</div>
    </div>
    <div class="card">
      <h2 class="card-title">プラン情報</h2>
      <div id="plan-info">読み込み中…</div>
      <a href="/app/account" class="btn" style="margin-top:14px">アカウント設定</a>
    </div>
  </div>
</main>

<footer class="app-footer">AOリサーチ</footer>

<script src="/shared/header.js"></script>
<script>
if (new URLSearchParams(location.search).get('email_pending') === '1') {
  document.getElementById('email-banner').style.display = 'flex';
  history.replaceState(null, '', '/app');
}
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
(async function () {
  const me = await renderHeader(document.getElementById('app-header'));
  if (!me) { location.href = '/login'; return; }

  document.getElementById('welcome').textContent = `${me.name || me.email} さん、ようこそ`;

  // BtoB プラン（tutor/school）のみ専用リンクを表示
  const planCode = me.plan?.plan_code || 'free';
  if (['tutor', 'school'].includes(planCode)) {
    const ql = document.getElementById('quick-links');
    ql.insertAdjacentHTML('beforeend',
      `<a href="/app/students"><svg aria-hidden="true" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 14l9-5-9-5-9 5 9 5zm0 0v6m-4-3.27l4 2.27 4-2.27"/></svg> 生徒管理</a>` +
      `<a href="/app/tutor/analysis"><svg aria-hidden="true" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg> 過去問分析</a>`
    );
  }

  const plan = me.plan;
  const used = plan.used_this_period ?? 0;
  const quota = plan.monthly_quota ?? 0;
  document.getElementById('stat-used').textContent = used;
  document.getElementById('stat-quota').textContent = quota;
  document.getElementById('stat-remaining').textContent = Math.max(0, quota - used);
  document.getElementById('plan-info').innerHTML = `
    <div style="font-weight:700;color:var(--brand-navy);font-size:1.1rem">${esc(plan.name)}</div>
    <div class="muted">月額 ${plan.price_monthly === 0 ? '無料' : '¥' + plan.price_monthly.toLocaleString()}</div>
    <div class="muted">${plan.plan_code === 'free' ? '累計' : '当月'} ${used} / ${quota} 回</div>
  `;

  try {
    const items = await (await fetch('/api/research?limit=8')).json();
    const list = document.getElementById('recent-list');
    if (!items.length) {
      list.innerHTML = '<div class="empty">まだ調査がありません。<a href="/app/research">最初の調査を始める</a></div>';
    } else {
      list.innerHTML = items.map(it => {
        const label = [it.university, it.faculty, it.department].filter(Boolean).join(' ');
        const when = (it.created_at || '').replace('T',' ').slice(0,16);
        return `<div class="recent-item">
          <div>
            <a href="/app/research/${esc(it.id)}" class="recent-title">${esc(label)}</a>
            <div class="recent-sub">${esc(when)} ${it.unknown_count != null ? `· 不明 ${it.unknown_count}件` : ''}</div>
          </div>
          <span class="status-tag ${esc(it.status)}">${esc(it.status)}</span>
        </div>`;
      }).join('');
    }
  } catch (e) {
    document.getElementById('recent-list').innerHTML = `<div class="empty">読み込み失敗: ${esc(e.message)}</div>`;
  }
})();
</script>
</body>
</html>
