<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ログイン — AOリサーチ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;500;600;700;800&family=Noto+Serif+JP:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared/tokens.css">
<style>
  body { min-height: 100vh; display: flex; flex-direction: column; background: linear-gradient(135deg, #312E81 0%, #6366F1 50%, #818CF8 100%); }
  .auth-wrap {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 48px 20px; min-height: 100vh;
  }
  .auth-card {
    width: 100%; max-width: 420px;
    background: rgba(255,255,255,0.88); border: 1.5px solid rgba(255,255,255,0.5);
    border-radius: 24px; padding: 40px 36px;
    box-shadow: 0 8px 48px rgba(49,46,129,.25), 0 0 0 1px rgba(255,255,255,0.1);
    backdrop-filter: blur(20px);
  }
  .auth-logo {
    text-align: center; margin-bottom: 28px;
  }
  .auth-logo a {
    display: inline-flex; align-items: center; gap: 10px; text-decoration: none;
  }
  .auth-logo-mark {
    width: 38px; height: 38px; background: linear-gradient(135deg, #6366F1, #8B5CF6);
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 15px; color: #fff; flex-shrink: 0;
  }
  .auth-logo-name { font-size: 1.15rem; font-weight: 800; color: var(--brand-navy); }
  .auth-title { font-size: 1.5rem; font-weight: 700; color: var(--brand-navy); text-align: center; margin-bottom: 6px; font-family: 'Noto Serif JP', Georgia, serif; }
  .auth-sub { font-size: .87rem; color: var(--muted); text-align: center; margin-bottom: 24px; line-height: 1.6; }

  .btn-google {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%; padding: 11px 20px;
    background: #fff; border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: .9rem; font-weight: 700; color: var(--ink);
    cursor: pointer; text-decoration: none;
    transition: border-color .15s, box-shadow .15s;
  }
  .btn-google:hover {
    border-color: #4285f4; box-shadow: 0 0 0 3px rgba(66,133,244,.1);
    text-decoration: none;
  }

  .auth-divider {
    display: flex; align-items: center; gap: 12px;
    margin: 18px 0; font-size: .75rem; color: var(--muted);
  }
  .auth-divider::before, .auth-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  .auth-form { display: flex; flex-direction: column; gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-label { font-size: .78rem; font-weight: 700; color: var(--ink-soft); letter-spacing: .02em; }
  input[type="email"], input[type="password"], input[type="text"] {
    width: 100%; background: var(--bg); border: 1.5px solid var(--border);
    border-radius: var(--radius-sm); color: var(--ink);
    font-family: inherit; font-size: .92rem; padding: 10px 13px; outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  input:focus-visible { border-color: var(--brand-blue); box-shadow: 0 0 0 3px rgba(99,102,241,.15); }
  input::placeholder { color: var(--muted); opacity: .7; }

  .auth-error {
    background: var(--red-soft); border: 1px solid #fca5a5;
    border-radius: var(--radius-sm); padding: 10px 14px;
    font-size: .84rem; color: var(--red); margin-bottom: 16px;
    display: flex; gap: 8px; align-items: flex-start;
  }
  .auth-success {
    background: #f0fdf4; border: 1px solid #86efac;
    border-radius: var(--radius-sm); padding: 10px 14px;
    font-size: .84rem; color: #15803d; margin-bottom: 16px;
    display: flex; gap: 8px; align-items: flex-start;
  }

  .auth-note {
    background: var(--brand-light); border-radius: var(--radius-sm);
    padding: 11px 14px; font-size: .8rem; color: var(--ink-soft);
    margin-top: 16px; line-height: 1.6;
  }

  .auth-footer {
    text-align: center; margin-top: 20px;
    font-size: .84rem; color: var(--muted);
  }
  .auth-footer a { color: var(--brand-blue); font-weight: 600; }
  .app-footer { background: transparent; border-top-color: rgba(255,255,255,0.15); color: rgba(255,255,255,0.6); }
</style>
</head>
<body>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <a href="/">
        <div class="auth-logo-mark">AO</div>
        <span class="auth-logo-name">AOリサーチ</span>
      </a>
    </div>

    <h1 class="auth-title">ログイン</h1>
    <p class="auth-sub">AOリサーチで総合型選抜の<br>公式情報を素早く確認しましょう。</p>

    <div id="error-area"></div>

    <a href="/auth/google" class="btn-google">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Googleでログイン
    </a>

    <div class="auth-divider">または</div>

    <form class="auth-form" action="/auth/login" method="post">
      <div class="form-group">
        <label class="form-label" for="email">メールアドレス</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email" spellcheck="false">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">パスワード</label>
        <input type="password" id="password" name="password" placeholder="8文字以上" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:4px">ログイン</button>
    </form>

    <div class="auth-note" style="display:flex;gap:8px;align-items:flex-start">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:1px"><path stroke-linecap="round" stroke-linejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z"/></svg>
      登録後3回まで無料でリサーチできます。クレジットカード不要。
    </div>

    <div class="auth-footer">
      アカウントをお持ちでない方は <a href="/register">新規登録</a>
    </div>
  </div>
</div>

<footer class="app-footer">AOリサーチ</footer>

<script>
// アプリ内ブラウザ（WebView）検知 → Googleログイン不可の警告
(function() {
  const ua = navigator.userAgent;
  const isInApp = /Threads|Instagram|FBAN|FBAV|Line\/|TwitterAndroid|Snapchat|MicroMessenger|GSA\/|YJApp|WebView|wv\b/i.test(ua)
    || (ua.includes('iPhone') && !ua.includes('Safari'))
    || (ua.includes('Android') && ua.includes('wv'));
  if (!isInApp) return;
  const banner = document.createElement('div');
  banner.style.cssText = 'background:#fef3c7;border:1px solid #fcd34d;border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:.86rem;color:#92400e;line-height:1.6';
  banner.innerHTML = '⚠️ <strong>アプリ内ブラウザではGoogleログインができません。</strong><br>右上のメニューから「ブラウザで開く」（Safari / Chrome）を選択してからログインしてください。';
  const area = document.getElementById('error-area');
  if (area) area.insertAdjacentElement('beforebegin', banner);
})();

const params = new URLSearchParams(location.search);
const err = params.get('error');
const msg = params.get('msg');
if (err) {
  const div = document.createElement('div');
  div.className = 'auth-error';
  div.setAttribute('role', 'alert');
  div.innerHTML = '<svg aria-hidden="true" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:1px"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/></svg>' + err.replace(/</g,'&lt;');
  document.getElementById('error-area').appendChild(div);
}
if (msg) {
  const div = document.createElement('div');
  div.className = 'auth-success';
  div.setAttribute('role', 'status');
  div.innerHTML = '<svg aria-hidden="true" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:1px"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>' + msg.replace(/</g,'&lt;');
  document.getElementById('error-area').appendChild(div);
}
</script>
</body>
</html>
