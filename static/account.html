<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アカウント — AOリサーチ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared/tokens.css">
</head>
<body>
<header class="app-header" id="app-header"></header>
<main class="app-shell">
  <h1 style="margin:0 0 8px;color:var(--brand-navy)">アカウント</h1>
  <p class="muted">プラン・利用状況の確認と管理。</p>

  <div class="card" style="margin-top:14px">
    <h2 class="card-title">プロフィール</h2>
    <div id="profile">読み込み中…</div>
  </div>

  <div class="card" style="margin-top:14px">
    <h2 class="card-title">プラン</h2>
    <div id="plan">読み込み中…</div>
    <a class="btn" href="/pricing" style="margin-top:14px">プラン一覧</a>
  </div>

  <div class="card" style="margin-top:14px">
    <h2 class="card-title">クレジット残高</h2>
    <div id="credits-section">読み込み中…</div>
  </div>
</main>
<footer class="app-footer">AOリサーチ</footer>
<script src="/shared/header.js"></script>
<script>
function esc(s) { return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
(async function () {
  const me = await renderHeader(document.getElementById('app-header'));
  if (!me) { location.href = '/login'; return; }
  document.getElementById('profile').innerHTML = `
    <div><strong>${esc(me.name)}</strong></div>
    <div class="muted">${esc(me.email)}</div>
  `;
  const plan = me.plan;
  const used = plan.used_this_period ?? 0;
  const planEl = document.getElementById('plan');
  planEl.innerHTML = `
    <div style="font-weight:700;color:var(--brand-navy);font-size:1.2rem">${esc(plan.name)}</div>
    <div class="muted">月額 ${plan.price_monthly === 0 ? '無料' : '¥' + plan.price_monthly.toLocaleString()}</div>
    <div style="margin-top:10px">
      <strong>${used} / ${plan.monthly_quota}</strong> 回 利用済み
      <span class="muted">(${plan.plan_code === 'free' ? '累計' : '今月'})</span>
    </div>
  `;

  // サブスクリプション管理ボタン（有料プランのみ）
  if (plan.plan_code !== 'free') {
    const portalBtn = document.createElement('button');
    portalBtn.className = 'btn';
    portalBtn.style.marginTop = '14px';
    portalBtn.textContent = 'サブスクリプション管理';
    portalBtn.onclick = async () => {
      try {
        const res = await fetch('/api/billing/portal', { method: 'POST' });
        if (!res.ok) { const e = await res.json(); throw new Error(e.detail || res.status); }
        const data = await res.json();
        window.location.href = data.portal_url;
      } catch (e) { alert('エラー: ' + e.message); }
    };
    planEl.appendChild(portalBtn);
  }

  // クレジット残高
  try {
    const cr = await fetch('/api/credits');
    if (cr.ok) {
      const cd = await cr.json();
      const sec = document.getElementById('credits-section');
      const histHtml = cd.history.length
        ? `<table style="width:100%;font-size:.82rem;border-collapse:collapse;margin-top:10px">
            <thead><tr style="color:var(--muted);font-size:.76rem">
              <th style="text-align:left;padding:4px 8px">パック</th>
              <th style="text-align:right;padding:4px 8px">クレジット</th>
              <th style="text-align:right;padding:4px 8px">購入日</th>
            </tr></thead><tbody>
            ${cd.history.map(h => `<tr>
              <td style="padding:4px 8px">${esc(h.pack_code.replace('pack_','') + '回パック')}</td>
              <td style="text-align:right;padding:4px 8px">+${h.credits}</td>
              <td style="text-align:right;padding:4px 8px;color:var(--muted)">${(h.created_at||'').slice(0,10)}</td>
            </tr>`).join('')}
            </tbody></table>`
        : '';
      sec.innerHTML = `
        <div style="font-size:2rem;font-weight:800;color:var(--brand-navy)">${cd.balance} <span style="font-size:1rem;color:var(--muted);font-weight:500">回分 残高</span></div>
        ${histHtml}
        <a class="btn" href="/pricing#packs" style="margin-top:12px">クレジットを追加する</a>
      `;
    }
  } catch (_) {}

  // Checkout 完了メッセージ
  const params = new URLSearchParams(location.search);
  if (params.get('checkout') === 'success') {
    const banner = document.createElement('div');
    banner.style.cssText = 'background:var(--brand-light);border:1px solid var(--brand-blue);border-radius:var(--radius);padding:14px;margin-bottom:14px;color:var(--brand-navy);font-weight:600;';
    banner.textContent = 'プランの変更が完了しました。';
    document.querySelector('.app-shell').prepend(banner);
    history.replaceState(null, '', '/app/account');
  }
  if (params.get('checkout') === 'pack_success') {
    const banner = document.createElement('div');
    banner.style.cssText = 'background:var(--green-soft);border:1px solid var(--green);border-radius:var(--radius);padding:14px;margin-bottom:14px;color:var(--green);font-weight:600;';
    banner.textContent = 'クレジットパックの購入が完了しました。残高に反映されています。';
    document.querySelector('.app-shell').prepend(banner);
    history.replaceState(null, '', '/app/account');
  }
})();
</script>
</body>
</html>
